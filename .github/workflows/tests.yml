name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install AutoDQ and release tools
        run: python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m unittest discover -s tests
      - name: Verify command line and ADQL
        run: |
          autodq --version
          autodq validate examples/sales_analysis.adql
          autodq validate examples/sales_auto.adql

  distribution:
    runs-on: ubuntu-latest
    needs: compatibility
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install release tools
        run: python -m pip install -e ".[dev]"
      - name: Build distributions
        run: python -m build
      - name: Inspect distributions
        run: |
          python -m twine check dist/*
          python scripts/check_distribution.py dist
      - name: Smoke test installed wheel
        run: python scripts/smoke_test_wheel.py dist

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Validate extension source
        working-directory: src/autodq/vscode/extension
        run: npm test
      - name: Package Marketplace VSIX
        working-directory: src/autodq/vscode/extension
        run: >-
          npx --yes @vscode/vsce@3.9.2 package
          --out "${GITHUB_WORKSPACE}/autodq-adql.vsix"
